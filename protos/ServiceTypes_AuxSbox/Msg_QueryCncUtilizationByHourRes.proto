// Message(s) for QueryCncUtilizationByHourRes

syntax = "proto3";

package smt_iot.v1.aux;

import "google/protobuf/timestamp.proto";

import "ReusableTypes_Common/TIotStatus.proto";
import "ServiceTypes_AuxSbox/TCncTypes.proto";

message QueryCncUtilizationByHourResRequest
{
  // If cnc_uids is empty, the service should return utilization for all CNCs.
  repeated string cnc_uids = 1;
  CncUtilizationTypeRequest utilization_type_request = 2;

  // start_datetime must be aligned to hour precision and must not be earlier
  // than the supported 10-year historical boundary from the current year.
  google.protobuf.Timestamp start_datetime = 3;

  // Supported values are HOUR, DAY, MONTH, and YEAR only.
  // TIMEBIN_UNSPECIFIED defaults to HOUR.
  TimeBin time_bin = 4;

  // Total number of bins from start_datetime inclusive.
  // Max 1000 bins.
  int32 total_bins = 5;
}

message QueryCncUtilizationByHourResResponse
{
  iot_common.v1.IotStatus iot_status = 1;
  repeated CncUtilization cnc_utilization_list = 2;
}
